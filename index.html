<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    
    <title>Planner Profissional 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        :root {
            --bg-main: #f8fafc;
            --sidebar: #0f172a;
            --line-color: #e2e8f0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: #1e293b;
            overflow: hidden;
            touch-action: manipulation;
        }

        /* O ALINHAMENTO MILIMÉTRICO (Confirmado pela sua Imagem 5) */
        .lined-paper {
            background-image: repeating-linear-gradient(transparent, transparent 39px, var(--line-color) 39px, var(--line-color) 40px);
            background-attachment: local;
            background-position: 0 -12px; 
            line-height: 40px;
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        @keyframes pulse-glow {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(0.98); box-shadow: 0 0 15px rgba(139, 92, 246, 0.3); }
        }
        
        .ai-loading {
            animation: pulse-glow 1.5s infinite ease-in-out;
            pointer-events: none;
            opacity: 0.7;
        }

        .month-btn {
            height: calc(100% / 12);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 700;
            transition: all 0.2s;
        }

        .month-btn.active {
            color: #818cf8;
            background: rgba(255,255,255,0.05);
            border-left: 3px solid #818cf8;
        }
    </style>
</head>
<body class="h-screen w-full flex overflow-hidden">

    <nav class="w-14 sm:w-16 bg-slate-950 flex flex-col shrink-0 shadow-2xl z-30 border-r border-slate-800">
        <div class="h-16 flex items-center justify-center border-b border-slate-800">
            <span class="text-slate-500 font-black text-xs">2026</span>
        </div>
        <div class="flex-1 flex flex-col" id="month-nav"></div>
    </nav>

    <main class="flex-1 flex flex-col h-full relative overflow-hidden bg-white">
        
        <header class="h-auto py-4 border-b border-slate-100 flex flex-col lg:flex-row items-center justify-between px-4 sm:px-10 bg-white shrink-0 gap-4">
            
            <div class="flex items-center justify-between w-full lg:w-auto gap-2 sm:gap-4">
                <button onclick="window.changeDay(-1)" class="p-2 hover:bg-slate-50 rounded-full text-slate-400 transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                </button>
                <div class="text-center lg:text-left flex-1 lg:flex-none">
                    <h2 class="text-[10px] sm:text-xs font-bold text-indigo-500 uppercase tracking-widest" id="day-of-week">---</h2>
                    <h1 class="text-lg sm:text-xl font-bold text-slate-800" id="full-date">Abrindo Agenda...</h1>
                </div>
                <button onclick="window.changeDay(1)" class="p-2 hover:bg-slate-50 rounded-full text-slate-400 transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                </button>
                
                <button onclick="window.organizeNotes()" id="btn-org" class="hidden sm:block ml-2 text-[10px] bg-indigo-50 text-indigo-600 px-3 py-1.5 rounded-full font-bold hover:bg-indigo-100 transition">✨ IA</button>
            </div>

            <div class="flex w-full lg:w-auto gap-4 overflow-x-auto hide-scrollbar pb-2 lg:pb-0 snap-x">
                
                <div class="min-w-[190px] w-48 bg-slate-50 rounded-xl border border-slate-200 p-3 shadow-sm flex flex-col justify-center snap-start">
                    <div class="text-[10px] font-bold text-slate-500 uppercase tracking-widest text-center mb-2" id="mini-cal-month">MÊS</div>
                    <div class="grid grid-cols-7 gap-x-1 text-[9px] font-bold text-slate-300 text-center mb-1">
                        <span>D</span><span>S</span><span>T</span><span>Q</span><span>Q</span><span>S</span><span>S</span>
                    </div>
                    <div id="mini-calendar-days" class="grid grid-cols-7 gap-1 text-[11px] font-medium text-center items-center">
                    </div>
                </div>

                <div class="min-w-[280px] w-72 bg-slate-50 rounded-xl border border-slate-200 p-3 shadow-sm flex flex-col snap-start">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Principais Prioridades</span>
                        <button onclick="window.extractPriorities()" id="btn-extract" class="text-[9px] bg-indigo-600 text-white px-2 py-0.5 rounded-full hover:bg-indigo-700 transition shrink-0">✨ EXTRAIR</button>
                    </div>
                    <div id="prio-list" class="space-y-1"></div>
                </div>
            </div>
        </header>

        <div class="flex-1 flex overflow-hidden relative">
            
            <div class="w-16 sm:w-20 border-r border-slate-100 flex flex-col overflow-hidden bg-slate-50/50 relative z-10" id="hours-sidebar">
                <div class="pt-10 pb-20" id="hours-container"></div>
            </div>

            <div class="flex-1 flex flex-col overflow-hidden relative">
                <textarea id="daily-notes" oninput="window.triggerSave()" 
                    class="flex-1 w-full px-6 pt-10 pb-20 sm:px-10 outline-none resize-none text-slate-700 text-lg sm:text-xl lined-paper hide-scrollbar overflow-y-auto"
                    placeholder="Escreva as anotações do dia..."></textarea>
                
                <div class="h-6 bg-white border-t border-slate-50 flex items-center px-4 justify-end shrink-0 absolute bottom-0 w-full z-20">
                    <span id="sync-status" class="text-[9px] font-bold text-slate-400 uppercase">Iniciando Motor Visual...</span>
                </div>
            </div>
        </div>
    </main>

    <script>
        window.addEventListener('error', function(e) {
            const status = document.getElementById('sync-status');
            if(status) {
                status.innerText = "ERRO: " + e.message;
                status.className = "text-[9px] font-bold text-red-500 uppercase";
            }
        });
    </script>

    <script type="module">
        // Importações do Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js";

        // Variáveis Centrais
        const MASTER_ID = "diego_sync_2026";
        let currentDate = new Date();
        if (currentDate.getFullYear() !== 2026) currentDate = new Date(2026, 0, 1);
        let localMemoryData = {}; 
        let pendingSaves = {}; 
        let db = null; // Banco será ativado depois

        // --- FASE 1: GERAÇÃO DA INTERFACE (Acontece 100% Offline e Imediato) ---
        
        function getDayKey() {
            let y = currentDate.getFullYear();
            let m = currentDate.getMonth() + 1;
            let d = currentDate.getDate();
            m = m < 10 ? '0' + m : m;
            d = d < 10 ? '0' + d : d;
            return y + "-" + m + "-" + d;
        }

        // 1. Rolagem Sincronizada
        const textarea = document.getElementById('daily-notes');
        const hoursSidebar = document.getElementById('hours-sidebar');
        if (textarea && hoursSidebar) {
            textarea.addEventListener('scroll', () => {
                hoursSidebar.scrollTop = textarea.scrollTop;
            });
        }

        // 2. Geração das Horas (05:00 às 22:00)
        const hoursContainer = document.getElementById('hours-container');
        if (hoursContainer) {
            for(let i=5; i<=22; i++) {
                const formatHour = i < 10 ? '0' + i : i;
                hoursContainer.innerHTML += `
                    <div class="h-[80px] flex items-start justify-center pr-2">
                        <span class="text-[10px] font-bold text-slate-400 mt-[10px] uppercase">${formatHour}:00</span>
                    </div>
                `;
            }
        }

        // 3. Geração dos Meses
        const monthNav = document.getElementById('month-nav');
        if (monthNav) {
            ["J","F","M","A","M","J","J","A","S","O","N","D"].forEach((m, i) => {
                const btn = document.createElement('button');
                btn.className = 'month-btn text-slate-500 hover:text-white';
                btn.id = 'm-' + i; 
                btn.innerText = m;
                btn.onclick = () => { 
                    window.triggerSave(); 
                    currentDate = new Date(2026, i, 1);
                    renderDayFromMemory();
                };
                monthNav.appendChild(btn);
            });
        }

        // 4. Geração das Prioridades
        const prioList = document.getElementById('prio-list');
        if (prioList) {
            for(let i=0; i<5; i++) {
                prioList.innerHTML += `
                    <div class="flex items-center gap-2">
                        <input type="checkbox" id="check-${i}" onchange="window.triggerSave()" class="w-3 h-3 rounded-full border-slate-300 text-indigo-600 cursor-pointer">
                        <input type="text" id="priority-${i}" oninput="window.triggerSave()" placeholder="..." class="bg-transparent border-b border-slate-100 w-full text-[11px] outline-none focus:border-indigo-300">
                    </div>
                `;
            }
        }

        // Funções Gráficas
        function renderMiniCalendar() {
            const calDays = document.getElementById('mini-calendar-days');
            const calMonth = document.getElementById('mini-cal-month');
            if (!calDays || !calMonth) return;
            
            calDays.innerHTML = "";
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const monthName = new Intl.DateTimeFormat('pt-BR', {month:'long'}).format(currentDate);
            calMonth.innerText = monthName + " " + year;
            
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            
            for (let i = 0; i < firstDay; i++) {
                calDays.innerHTML += '<div></div>';
            }
            for (let day = 1; day <= daysInMonth; day++) {
                const isToday = day === currentDate.getDate();
                const bgClass = isToday ? 'bg-indigo-500 text-white rounded-full shadow-sm' : 'hover:bg-slate-200 cursor-pointer rounded-full text-slate-600 transition-colors';
                calDays.innerHTML += '<div class="p-1 mx-0.5 ' + bgClass + '" onclick="window.goToDate(' + year + ', ' + month + ', ' + day + ')">' + day + '</div>';
            }
        }

        window.goToDate = (y, m, d) => {
            const targetDate = new Date(y, m, d);
            const diffDays = Math.round((targetDate - currentDate) / (1000 * 60 * 60 * 24));
            if (diffDays !== 0) window.changeDay(diffDays);
        };

        function captureScreenData() {
            const priorities = [];
            for(let i=0; i<5; i++) {
                const p = document.getElementById('priority-' + i);
                const c = document.getElementById('check-' + i);
                priorities.push({
                    text: p ? p.value : "",
                    checked: c ? c.checked : false
                });
            }
            return {
                notes: textarea ? textarea.value : "",
                priorities: priorities,
                updatedAt: Date.now()
            };
        }

        function updateDateHeaders() {
            const daysOfWeek = ['Domingo', 'Segunda-feira', 'Terça-feira', 'Quarta-feira', 'Quinta-feira', 'Sexta-feira', 'Sábado'];
            const monthName = new Intl.DateTimeFormat('pt-BR', {month:'long'}).format(currentDate);

            const dayEl = document.getElementById('day-of-week');
            const dateEl = document.getElementById('full-date');
            if (dayEl) dayEl.innerText = daysOfWeek[currentDate.getDay()];
            if (dateEl) {
                let d = currentDate.getDate();
                d = d < 10 ? '0' + d : d;
                dateEl.innerText = d + " de " + monthName;
            }
            
            document.querySelectorAll('.month-btn').forEach(b => b.classList.remove('active'));
            const mBtn = document.getElementById('m-' + currentDate.getMonth());
            if (mBtn) mBtn.classList.add('active');
        }

        function renderDayFromMemory() {
            updateDateHeaders();
            renderMiniCalendar(); 
            
            const key = getDayKey();
            const data = localMemoryData[key] || { notes: "", priorities: [] };
            
            if (textarea) textarea.value = data.notes || "";
            
            for(let i=0; i<5; i++) {
                const p = document.getElementById('priority-' + i);
                const c = document.getElementById('check-' + i);
                
                let pText = "";
                let pCheck = false;
                if (data.priorities && data.priorities[i]) {
                    pText = data.priorities[i].text || "";
                    pCheck = data.priorities[i].checked || false;
                }
                
                if (p) p.value = pText;
                if (c) c.checked = pCheck;
            }
        }

        window.changeDay = (d) => {
            window.triggerSave(); 
            currentDate.setDate(currentDate.getDate() + d);
            if(currentDate.getFullYear() !== 2026) currentDate.setFullYear(2026);
            renderDayFromMemory(); 
        };

        // RENDERIZA A TELA IMEDIATAMENTE (Cura a Tela Branca)
        renderDayFromMemory();
        document.getElementById('sync-status').innerText = "TELA RENDERIZADA. CONECTANDO...";


        // --- FASE 2: CONEXÃO COM A NUVEM (Acontece em Segundo Plano) ---

        const firebaseConfig = {
            apiKey: "AIzaSyAaJ4CDIJlXbEvuJF0_lKNtoYtOek1bjS0",
            authDomain: "agenda-2026-e3b3a.firebaseapp.com",
            databaseURL: "https://agenda-2026-e3b3a-default-rtdb.firebaseio.com",
            projectId: "agenda-2026-e3b3a",
            storageBucket: "agenda-2026-e3b3a.firebasestorage.app",
            messagingSenderId: "1090124230282",
            appId: "1:1090124230282:web:715c0a3f89078602568770"
        };

        try {
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            db = getDatabase(app);

            signInAnonymously(auth).catch(e => console.error("Auth", e));

            onAuthStateChanged(auth, async (u) => {
                if (u) {
                    const syncEl = document.getElementById('sync-status');
                    if (syncEl) {
                        syncEl.innerText = "BAIXANDO DADOS DA NUVEM...";
                        syncEl.className = "text-[9px] font-bold text-indigo-500 uppercase";
                    }
                    try {
                        const snapshot = await get(child(ref(db), 'users/' + MASTER_ID + '/days'));
                        if (snapshot.exists()) {
                            localMemoryData = snapshot.val(); 
                            renderDayFromMemory(); // Atualiza a tela com os textos baixados
                        }
                        if (syncEl) {
                            syncEl.innerText = "SISTEMA PRONTO E SINCRONIZADO";
                            syncEl.className = "text-[9px] font-bold text-slate-400 uppercase";
                        }
                    } catch (e) {
                        if (syncEl) {
                            syncEl.innerText = "OFFLINE (DADOS LOCAIS)";
                            syncEl.className = "text-[9px] font-bold text-slate-400 uppercase";
                        }
                    }
                }
            });
        } catch (error) {
            document.getElementById('sync-status').innerText = "OFFLINE (SEM CONEXÃO FIREBASE)";
        }

        // --- FASE 3: SALVAMENTO E INTELIGÊNCIA ARTIFICIAL ---

        window.triggerSave = () => {
            const currentKey = getDayKey();
            const currentData = captureScreenData();
            
            localMemoryData[currentKey] = currentData; 
            
            const syncEl = document.getElementById('sync-status');
            if (syncEl) {
                syncEl.innerText = "PROCESSANDO...";
                syncEl.className = "text-[9px] font-bold text-amber-500 uppercase";
            }

            if (pendingSaves[currentKey]) clearTimeout(pendingSaves[currentKey]);
            
            pendingSaves[currentKey] = setTimeout(() => {
                if (db) {
                    const dbRef = ref(db, 'users/' + MASTER_ID + '/days/' + currentKey);
                    set(dbRef, currentData).then(() => {
                        if (syncEl) {
                            syncEl.innerText = "SALVO NA NUVEM";
                            syncEl.className = "text-[9px] font-bold text-emerald-500 uppercase";
                        }
                    }).catch(e => {
                        if (syncEl) {
                            syncEl.innerText = "FALHA DE REDE (SALVO LOCAL)";
                            syncEl.className = "text-[9px] font-bold text-red-500 uppercase";
                        }
                    });
                }
                delete pendingSaves[currentKey];
            }, 600);
        };

        const apiKey = "AIzaSyC_hFcKVtSUEG9MR9-gERYHYXHSJV0qJtM"; 
        window.organizeNotes = async () => {
            if(!textarea || !textarea.value.trim()) return;
            textarea.classList.add('ai-loading');
            try {
                const res = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=' + apiKey, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: "Organize as notas de reunião em tópicos profissionais e corrija a gramática:\n\n" + textarea.value }] }] })
                });
                const data = await res.json();
                textarea.value = data.candidates[0].content.parts[0].text;
                window.triggerSave();
            } catch (e) { console.error("AI Error:", e); } 
            finally { textarea.classList.remove('ai-loading'); }
        };

        window.extractPriorities = async () => {
            if(!textarea || !textarea.value.trim()) return;
            const btn = document.getElementById('btn-extract');
            if (btn) btn.classList.add('ai-loading');
            try {
                const res = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=' + apiKey, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        contents: [{ parts: [{ text: "Extraia 5 prioridades urgentes destas notas em formato JSON array:\n\n" + textarea.value }] }],
                        generationConfig: { responseMimeType: "application/json", responseSchema: { type: "ARRAY", items: { type: "STRING" } } }
                    })
                });
                const data = await res.json();
                const prios = JSON.parse(data.candidates[0].content.parts[0].text);
                prios.forEach((p, i) => { 
                    const pr = document.getElementById('priority-' + i);
                    if(i < 5 && pr) pr.value = p; 
                });
                window.triggerSave();
            } catch (e) { console.error("AI Error:", e); } 
            finally { if (btn) btn.classList.remove('ai-loading'); }
        };

        // Swipe para Celular
        let touchstartX = 0;
        let touchstartY = 0;
        document.addEventListener('touchstart', e => {
            touchstartX = e.changedTouches[0].screenX;
            touchstartY = e.changedTouches[0].screenY;
        }, {passive: true});

        document.addEventListener('touchend', e => {
            const touchendX = e.changedTouches[0].screenX;
            const touchendY = e.changedTouches[0].screenY;
            if (Math.abs(touchstartX - touchendX) > 100 && Math.abs(touchstartY - touchendY) < 50) {
                if (touchstartX - touchendX > 100) window.changeDay(1);
                if (touchendX - touchstartX > 100) window.changeDay(-1);
            }
        });
    </script>
</body>
</html>
