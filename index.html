<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    
    <title>Planner Profissional 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        :root {
            --bg-main: #f8fafc;
            --sidebar: #0f172a;
            --line-color: #e2e8f0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: #1e293b;
            overflow: hidden;
            touch-action: manipulation;
        }

        .lined-paper {
            background-image: repeating-linear-gradient(transparent, transparent 23px, var(--line-color) 23px, var(--line-color) 24px);
            background-attachment: local;
            line-height: 24px;
            padding-top: 10px;
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        @keyframes pulse-glow {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(0.98); box-shadow: 0 0 15px rgba(139, 92, 246, 0.3); }
        }
        
        .ai-loading {
            animation: pulse-glow 1.5s infinite ease-in-out;
            pointer-events: none;
            opacity: 0.7;
        }

        .month-btn {
            height: calc(100% / 12);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 700;
            transition: all 0.2s;
        }

        .month-btn.active {
            color: #818cf8;
            background: rgba(255,255,255,0.05);
            border-left: 3px solid #818cf8;
        }
    </style>
</head>
<body class="h-screen w-full flex overflow-hidden">

    <nav class="w-14 sm:w-16 bg-slate-950 flex flex-col shrink-0 shadow-2xl z-30 border-r border-slate-800">
        <div class="h-16 flex items-center justify-center border-b border-slate-800">
            <span class="text-slate-500 font-black text-xs">2026</span>
        </div>
        <div class="flex-1 flex flex-col" id="month-nav"></div>
    </nav>

    <main class="flex-1 flex flex-col h-full relative overflow-hidden bg-white">
        
        <header class="h-24 sm:h-32 border-b border-slate-100 flex items-center justify-between px-6 sm:px-10 bg-white shrink-0">
            <div class="flex items-center gap-4">
                <button onclick="changeDay(-1)" class="p-2 hover:bg-slate-50 rounded-full text-slate-400 transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                </button>
                <div>
                    <h2 class="text-xs font-bold text-indigo-500 uppercase tracking-widest" id="day-of-week">---</h2>
                    <h1 class="text-xl sm:text-3xl font-bold text-slate-800" id="full-date">A carregar...</h1>
                </div>
                <button onclick="changeDay(1)" class="p-2 hover:bg-slate-50 rounded-full text-slate-400 transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                </button>
            </div>

            <div class="hidden md:block w-80 lg:w-96 bg-slate-50 rounded-xl border border-slate-200 p-3 shadow-sm">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Principais Prioridades</span>
                    <button onclick="extractPriorities()" id="btn-extract" class="text-[9px] bg-indigo-600 text-white px-2 py-0.5 rounded-full hover:bg-indigo-700 transition">✨ EXTRAIR IA</button>
                </div>
                <div id="prio-list" class="space-y-1"></div>
            </div>
        </header>

        <div class="flex-1 flex overflow-hidden">
            <div class="w-16 sm:w-20 border-r border-slate-100 flex flex-col overflow-y-auto hide-scrollbar bg-slate-50/50">
                <div class="pt-4" id="hours-container"></div>
            </div>

            <div class="flex-1 flex flex-col overflow-hidden relative">
                <div class="h-10 bg-slate-50/80 border-b border-slate-100 flex items-center justify-between px-6 shrink-0">
                    <span class="text-[10px] font-bold text-slate-400 uppercase">Notas e Algoritmos</span>
                    <button onclick="organizeNotes()" id="btn-org" class="text-indigo-600 text-[10px] font-bold hover:underline">✨ ORGANIZAR COM IA</button>
                </div>
                <textarea id="daily-notes" oninput="debouncedSave()" 
                    class="flex-1 w-full p-6 sm:p-10 outline-none resize-none text-slate-700 text-lg sm:text-xl lined-paper hide-scrollbar transition-opacity duration-200"
                    placeholder="Escreva aqui..."></textarea>
                
                <div class="h-6 bg-white border-t border-slate-50 flex items-center px-4 justify-end">
                    <span id="sync-status" class="text-[9px] text-slate-300 italic uppercase">A aguardar ligação...</span>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAaJ4CDIJLXbEvuJF0_LKNtoYtOek1bjS0",
            authDomain: "agenda-2026-e3b3a.firebaseapp.com",
            databaseURL: "https://agenda-2026-e3b3a-default-rtdb.firebaseio.com",
            projectId: "agenda-2026-e3b3a",
            storageBucket: "agenda-2026-e3b3a.firebasestorage.app",
            messagingSenderId: "1090124230282",
            appId: "1:1090124230282:web:715c0a3f89078602568770"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let user = null;
        let currentDate = new Date();
        if (currentDate.getFullYear() !== 2026) currentDate = new Date(2026, 0, 1);
        
        // Variáveis de Sistema Blindadas
        let saveTimeout = null;
        let currentUnsubscribe = null;
        let isDataLoaded = false; // A Trava Principal

        function getDomData() {
            const priorities = [];
            for(let i=0; i<5; i++) {
                const p = document.getElementById(`priority-${i}`);
                const c = document.getElementById(`check-${i}`);
                priorities.push({
                    text: p ? p.value : "",
                    checked: c ? c.checked : false
                });
            }
            const notes = document.getElementById('daily-notes');
            return {
                notes: notes ? notes.value : "",
                priorities: priorities,
                updatedAt: Date.now()
            };
        }

        async function forceSave(key, dataObj) {
            if (!user) return;
            try {
                const dbRef = ref(db, 'users/' + user.uid + '/days/' + key);
                await set(dbRef, dataObj);
                const status = document.getElementById('sync-status');
                if (status) status.innerText = "Sincronizado";
            } catch (e) {
                const status = document.getElementById('sync-status');
                if (status) status.innerText = "Erro ao guardar";
            }
        }

        // Função que Bloqueia Visão e Edição enquanto Carrega
        window.clearAndLockScreen = () => {
            const notes = document.getElementById('daily-notes');
            if(notes) {
                notes.value = "";
                notes.readOnly = true;
                notes.classList.add('opacity-40'); // Efeito de bloqueio visual
            }
            for(let i=0; i<5; i++) {
                const p = document.getElementById(`priority-${i}`);
                if (p) { p.value = ""; p.readOnly = true; p.classList.add('opacity-40'); }
                const c = document.getElementById(`check-${i}`);
                if (c) { c.checked = false; c.disabled = true; }
            }
        };

        // Função que Libera a Edição após Carregamento
        window.unlockScreen = () => {
            const notes = document.getElementById('daily-notes');
            if(notes) {
                notes.readOnly = false;
                notes.classList.remove('opacity-40');
            }
            for(let i=0; i<5; i++) {
                const p = document.getElementById(`priority-${i}`);
                if (p) { p.readOnly = false; p.classList.remove('opacity-40'); }
                const c = document.getElementById(`check-${i}`);
                if (c) { c.disabled = false; }
            }
        };

        const monthNav = document.getElementById('month-nav');
        ["J","F","M","A","M","J","J","A","S","O","N","D"].forEach((m, i) => {
            const btn = document.createElement('button');
            btn.className = 'month-btn text-slate-500 hover:text-white';
            btn.id = `m-${i}`; btn.innerText = m;
            btn.onclick = async () => { 
                if (!isDataLoaded) return; // Se ainda não carregou, ignora cliques ansiosos

                if (saveTimeout) { clearTimeout(saveTimeout); saveTimeout = null; }
                await forceSave(getDayKey(), getDomData());
                
                isDataLoaded = false; // Volta a trancar
                if (document.activeElement) document.activeElement.blur(); 
                window.clearAndLockScreen(); 

                currentDate = new Date(2026, i, 1); 
                updateUI(); 
            };
            monthNav.appendChild(btn);
        });

        const prioList = document.getElementById('prio-list');
        for(let i=0; i<5; i++) {
            prioList.innerHTML += `
                <div class="flex items-center gap-2">
                    <input type="checkbox" id="check-${i}" onchange="window.debouncedSave()" class="w-3 h-3 rounded-full border-slate-300 text-indigo-600 transition-opacity duration-200">
                    <input type="text" id="priority-${i}" oninput="window.debouncedSave()" placeholder="..." class="bg-transparent border-b border-slate-100 w-full text-[11px] outline-none focus:border-indigo-300 transition-opacity duration-200">
                </div>
            `;
        }

        const hoursContainer = document.getElementById('hours-container');
        for(let i=7; i<=22; i++) {
            hoursContainer.innerHTML += `
                <div class="h-[72px] flex items-start justify-center pr-2">
                    <span class="text-[10px] font-bold text-slate-400 mt-[-6px] uppercase">${i}:00</span>
                </div>
            `;
        }

        signInAnonymously(auth).catch(e => console.error("Auth Error", e));
        onAuthStateChanged(auth, (u) => {
            user = u;
            updateUI();
        });

        window.debouncedSave = () => {
            if (!isDataLoaded) return; // PROÍBE SALVAR SE A TELA AINDA ESTÁ A CARREGAR

            const status = document.getElementById('sync-status');
            if (status) status.innerText = "A guardar...";

            const keyToSave = getDayKey();
            const dataToSave = getDomData();

            if (saveTimeout) clearTimeout(saveTimeout);

            saveTimeout = setTimeout(() => {
                forceSave(keyToSave, dataToSave);
                saveTimeout = null;
            }, 1000);
        };

        function updateUI() {
            const key = getDayKey();
            const daysOfWeek = ['Domingo', 'Segunda-feira', 'Terça-feira', 'Quarta-feira', 'Quinta-feira', 'Sexta-feira', 'Sábado'];
            const monthName = new Intl.DateTimeFormat('pt-BR', {month:'long'}).format(currentDate);

            document.getElementById('day-of-week').innerText = daysOfWeek[currentDate.getDay()];
            document.getElementById('full-date').innerText = `${currentDate.getDate().toString().padStart(2, '0')} de ${monthName}`;
            
            document.querySelectorAll('.month-btn').forEach(b => b.classList.remove('active'));
            const mBtn = document.getElementById(`m-${currentDate.getMonth()}`);
            if (mBtn) mBtn.classList.add('active');

            if (!user) return;
            
            if (currentUnsubscribe) {
                currentUnsubscribe();
            }

            const dbRef = ref(db, 'users/' + user.uid + '/days/' + key);
            
            currentUnsubscribe = onValue(dbRef, (snapshot) => {
                isDataLoaded = true; // DADOS CHEGARAM DA NUVEM!

                const isFocused = document.activeElement && 
                                  (document.activeElement.tagName === 'TEXTAREA' || 
                                   document.activeElement.tagName === 'INPUT');
                const hasText = document.getElementById('daily-notes').value.trim() !== "";
                
                // Só impede de reescrever a tela se já estiver com as mãos no teclado a digitar
                if (isFocused && hasText) {
                    window.unlockScreen();
                    return;
                }

                const data = snapshot.val();
                if (data) {
                    const notes = document.getElementById('daily-notes');
                    if (notes) notes.value = data.notes || "";
                    
                    data.priorities?.forEach((p, i) => {
                        const el = document.getElementById(`priority-${i}`);
                        const chk = document.getElementById(`check-${i}`);
                        if(el) el.value = p.text || "";
                        if(chk) chk.checked = p.checked || false;
                    });
                } else {
                    const notes = document.getElementById('daily-notes');
                    if (notes) notes.value = "";
                    for(let i=0; i<5; i++) {
                        const p = document.getElementById(`priority-${i}`);
                        if (p) p.value = "";
                        const c = document.getElementById(`check-${i}`);
                        if (c) c.checked = false;
                    }
                }
                
                window.unlockScreen(); // Liberta o ecrã para trabalhar
            });
        }

        function getDayKey() {
            return `${currentDate.getFullYear()}-${String(currentDate.getMonth()+1).padStart(2, '0')}-${String(currentDate.getDate()).padStart(2, '0')}`;
        }

        window.changeDay = async (d) => {
            if (!isDataLoaded) return; // Impede saltar dias se a rede estiver lenta

            if (saveTimeout) {
                clearTimeout(saveTimeout);
                saveTimeout = null;
            }
            const status = document.getElementById('sync-status');
            if (status) status.innerText = "Guardando...";
            await forceSave(getDayKey(), getDomData()); // Guarda a folha atual antes de mudar

            isDataLoaded = false; // Tranca tudo de novo
            if (document.activeElement) document.activeElement.blur();
            
            window.clearAndLockScreen(); 

            currentDate.setDate(currentDate.getDate() + d);
            if(currentDate.getFullYear() !== 2026) currentDate.setFullYear(2026);
            
            updateUI();
        };

        const apiKey = "AIzaSyC_hFcKVtSUEG9MR9-gERYHYXHSJV0qJtM"; 
        window.organizeNotes = async () => {
            if (!isDataLoaded) return;
            const el = document.getElementById('daily-notes');
            if(!el.value.trim()) return;
            el.classList.add('ai-loading');
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: "Organize as notas de reunião em tópicos profissionais e corrija a gramática:\n\n" + el.value }] }] })
                });
                const data = await res.json();
                el.value = data.candidates[0].content.parts[0].text;
                window.debouncedSave();
            } catch (e) { console.error("AI Error:", e); } 
            finally { el.classList.remove('ai-loading'); }
        };

        window.extractPriorities = async () => {
            if (!isDataLoaded) return;
            const text = document.getElementById('daily-notes').value;
            if(!text.trim()) return;
            const btn = document.getElementById('btn-extract');
            btn.classList.add('ai-loading');
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        contents: [{ parts: [{ text: "Extraia 5 prioridades urgentes destas notas em formato JSON array:\n\n" + text }] }],
                        generationConfig: { responseMimeType: "application/json", responseSchema: { type: "ARRAY", items: { type: "STRING" } } }
                    })
                });
                const data = await res.json();
                const prios = JSON.parse(data.candidates[0].content.parts[0].text);
                prios.forEach((p, i) => { if(i < 5) document.getElementById(`priority-${i}`).value = p; });
                window.debouncedSave();
            } catch (e) { console.error("AI Error:", e); } 
            finally { btn.classList.remove('ai-loading'); }
        };

        let touchstartX = 0;
        let touchstartY = 0;
        let isSwiping = false; // Cooldown para o dedo

        document.addEventListener('touchstart', e => {
            touchstartX = e.changedTouches[0].screenX;
            touchstartY = e.changedTouches[0].screenY;
        }, {passive: true});

        document.addEventListener('touchend', async e => {
            if (isSwiping || !isDataLoaded) return; // Só arrasta se já carregou
            
            const touchendX = e.changedTouches[0].screenX;
            const touchendY = e.changedTouches[0].screenY;
            
            if (Math.abs(touchstartX - touchendX) > 100 && Math.abs(touchstartY - touchendY) < 50) {
                isSwiping = true;
                if (touchstartX - touchendX > 100) await window.changeDay(1);
                if (touchendX - touchstartX > 100) await window.changeDay(-1);
                setTimeout(() => { isSwiping = false; }, 400); // 400ms de respiro entre páginas
            }
        });
    </script>
</body>
</html>
