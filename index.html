<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    
    <title>Planner Profissional 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        :root {
            --bg-main: #f8fafc;
            --sidebar: #0f172a;
            --line-color: #e2e8f0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: #1e293b;
            overflow: hidden;
            touch-action: manipulation;
        }

        .lined-paper {
            background-image: repeating-linear-gradient(transparent, transparent 23px, var(--line-color) 23px, var(--line-color) 24px);
            background-attachment: local;
            line-height: 24px;
            padding-top: 10px;
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        @keyframes pulse-glow {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(0.98); box-shadow: 0 0 15px rgba(139, 92, 246, 0.3); }
        }
        
        .ai-loading {
            animation: pulse-glow 1.5s infinite ease-in-out;
            pointer-events: none;
            opacity: 0.7;
        }

        .month-btn {
            height: calc(100% / 12);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 700;
            transition: all 0.2s;
        }

        .month-btn.active {
            color: #818cf8;
            background: rgba(255,255,255,0.05);
            border-left: 3px solid #818cf8;
        }
    </style>
</head>
<body class="h-screen w-full flex overflow-hidden">

    <nav class="w-14 sm:w-16 bg-slate-950 flex flex-col shrink-0 shadow-2xl z-30 border-r border-slate-800">
        <div class="h-16 flex items-center justify-center border-b border-slate-800">
            <span class="text-slate-500 font-black text-xs">2026</span>
        </div>
        <div class="flex-1 flex flex-col" id="month-nav"></div>
    </nav>

    <main class="flex-1 flex flex-col h-full relative overflow-hidden bg-white">
        
        <header class="h-24 sm:h-32 border-b border-slate-100 flex items-center justify-between px-6 sm:px-10 bg-white shrink-0">
            <div class="flex items-center gap-4">
                <button onclick="window.changeDay(-1)" class="p-2 hover:bg-slate-50 rounded-full text-slate-400 transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                </button>
                <div>
                    <h2 class="text-xs font-bold text-indigo-500 uppercase tracking-widest" id="day-of-week">---</h2>
                    <h1 class="text-xl sm:text-3xl font-bold text-slate-800" id="full-date">Carregando sistema...</h1>
                </div>
                <button onclick="window.changeDay(1)" class="p-2 hover:bg-slate-50 rounded-full text-slate-400 transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                </button>
            </div>

            <div class="hidden md:block w-80 lg:w-96 bg-slate-50 rounded-xl border border-slate-200 p-3 shadow-sm">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Principais Prioridades</span>
                    <button onclick="window.extractPriorities()" id="btn-extract" class="text-[9px] bg-indigo-600 text-white px-2 py-0.5 rounded-full hover:bg-indigo-700 transition">✨ EXTRAIR IA</button>
                </div>
                <div id="prio-list" class="space-y-1"></div>
            </div>
        </header>

        <div class="flex-1 flex overflow-hidden">
            <div class="w-16 sm:w-20 border-r border-slate-100 flex flex-col overflow-y-auto hide-scrollbar bg-slate-50/50">
                <div class="pt-4" id="hours-container"></div>
            </div>

            <div class="flex-1 flex flex-col overflow-hidden relative">
                <div class="h-10 bg-slate-50/80 border-b border-slate-100 flex items-center justify-between px-6 shrink-0">
                    <span class="text-[10px] font-bold text-slate-400 uppercase">Notas e Algoritmos</span>
                    <button onclick="window.organizeNotes()" id="btn-org" class="text-indigo-600 text-[10px] font-bold hover:underline">✨ ORGANIZAR COM IA</button>
                </div>
                <textarea id="daily-notes" oninput="window.triggerSave()" 
                    class="flex-1 w-full p-6 sm:p-10 outline-none resize-none text-slate-700 text-lg sm:text-xl lined-paper hide-scrollbar"
                    placeholder="Escreva aqui..."></textarea>
                
                <div class="h-6 bg-white border-t border-slate-50 flex items-center px-4 justify-end">
                    <span id="sync-status" class="text-[9px] text-slate-300 italic uppercase">Iniciando...</span>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAaJ4CDIJlXbEvuJF0_lKNtoYtOek1bjS0",
            authDomain: "agenda-2026-e3b3a.firebaseapp.com",
            databaseURL: "https://agenda-2026-e3b3a-default-rtdb.firebaseio.com",
            projectId: "agenda-2026-e3b3a",
            storageBucket: "agenda-2026-e3b3a.firebasestorage.app",
            messagingSenderId: "1090124230282",
            appId: "1:1090124230282:web:715c0a3f89078602568770"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let user = null;
        let currentDate = new Date();
        if (currentDate.getFullYear() !== 2026) currentDate = new Date(2026, 0, 1);
        
        // A NOVA ARQUITETURA: Memória RAM como fonte principal da verdade
        let localMemoryData = {}; 
        let pendingSaves = {}; // Fila inteligente de uploads

        function getDayKey() {
            return `${currentDate.getFullYear()}-${String(currentDate.getMonth()+1).padStart(2, '0')}-${String(currentDate.getDate()).padStart(2, '0')}`;
        }

        // Tira uma "fotografia" do que está escrito no ecrã neste exato momento
        function captureScreenData() {
            const priorities = [];
            for(let i=0; i<5; i++) {
                const p = document.getElementById(`priority-${i}`);
                const c = document.getElementById(`check-${i}`);
                priorities.push({
                    text: p ? p.value : "",
                    checked: c ? c.checked : false
                });
            }
            const notes = document.getElementById('daily-notes');
            return {
                notes: notes ? notes.value : "",
                priorities: priorities,
                updatedAt: Date.now()
            };
        }

        // Puxa os dados da Memória RAM para preencher o ecrã instantaneamente
        function renderDayFromMemory() {
            updateDateHeaders();
            const key = getDayKey();
            const data = localMemoryData[key] || { notes: "", priorities: [] };
            
            const notesEl = document.getElementById('daily-notes');
            if (notesEl) notesEl.value = data.notes || "";
            
            for(let i=0; i<5; i++) {
                const p = document.getElementById(`priority-${i}`);
                const c = document.getElementById(`check-${i}`);
                if (p) p.value = data.priorities?.[i]?.text || "";
                if (c) c.checked = data.priorities?.[i]?.checked || false;
            }
        }

        function updateDateHeaders() {
            const daysOfWeek = ['Domingo', 'Segunda-feira', 'Terça-feira', 'Quarta-feira', 'Quinta-feira', 'Sexta-feira', 'Sábado'];
            const monthName = new Intl.DateTimeFormat('pt-BR', {month:'long'}).format(currentDate);

            document.getElementById('day-of-week').innerText = daysOfWeek[currentDate.getDay()];
            document.getElementById('full-date').innerText = `${currentDate.getDate().toString().padStart(2, '0')} de ${monthName}`;
            
            document.querySelectorAll('.month-btn').forEach(b => b.classList.remove('active'));
            const mBtn = document.getElementById(`m-${currentDate.getMonth()}`);
            if (mBtn) mBtn.classList.add('active');
        }

        // MOTOR DE SALVAMENTO DE ALTA PERFORMANCE (Distribuído)
        window.triggerSave = () => {
            const currentKey = getDayKey();
            const currentData = captureScreenData();
            
            // 1. Grava na RAM imediatamente (Zero latência)
            localMemoryData[currentKey] = currentData; 
            
            document.getElementById('sync-status').innerText = "A processar...";

            // 2. Limpa envios anteriores apenas para ESTE dia específico
            if (pendingSaves[currentKey]) clearTimeout(pendingSaves[currentKey]);
            
            // 3. Empacota e envia para a nuvem silenciosamente
            pendingSaves[currentKey] = setTimeout(() => {
                if (user) {
                    const dbRef = ref(db, 'users/' + user.uid + '/days/' + currentKey);
                    set(dbRef, currentData).then(() => {
                        document.getElementById('sync-status').innerText = "Sincronizado na Nuvem";
                    }).catch(e => {
                        document.getElementById('sync-status').innerText = "Falha de rede (Salvo local)";
                    });
                }
                delete pendingSaves[currentKey];
            }, 600);
        };

        // NAVEGAÇÃO IMEDIATA SEM BLOQUEIOS
        window.changeDay = (d) => {
            window.triggerSave(); // Regista o ecrã atual antes de sair
            
            currentDate.setDate(currentDate.getDate() + d);
            if(currentDate.getFullYear() !== 2026) currentDate.setFullYear(2026);
            
            renderDayFromMemory(); // Abre a página seguinte em milissegundos
        };

        // Inicialização dos Meses
        const monthNav = document.getElementById('month-nav');
        ["J","F","M","A","M","J","J","A","S","O","N","D"].forEach((m, i) => {
            const btn = document.createElement('button');
            btn.className = 'month-btn text-slate-500 hover:text-white';
            btn.id = `m-${i}`; btn.innerText = m;
            btn.onclick = () => { 
                window.triggerSave(); // Regista o ecrã atual antes de saltar de mês
                currentDate = new Date(2026, i, 1);
                renderDayFromMemory();
            };
            monthNav.appendChild(btn);
        });

        // Interface das Prioridades
        const prioList = document.getElementById('prio-list');
        for(let i=0; i<5; i++) {
            prioList.innerHTML += `
                <div class="flex items-center gap-2">
                    <input type="checkbox" id="check-${i}" onchange="window.triggerSave()" class="w-3 h-3 rounded-full border-slate-300 text-indigo-600">
                    <input type="text" id="priority-${i}" oninput="window.triggerSave()" placeholder="..." class="bg-transparent border-b border-slate-100 w-full text-[11px] outline-none focus:border-indigo-300">
                </div>
            `;
        }

        const hoursContainer = document.getElementById('hours-container');
        for(let i=7; i<=22; i++) {
            hoursContainer.innerHTML += `
                <div class="h-[72px] flex items-start justify-center pr-2">
                    <span class="text-[10px] font-bold text-slate-400 mt-[-6px] uppercase">${i}:00</span>
                </div>
            `;
        }

        // Arranque Inicial (Baixa o ano inteiro numa pancada só)
        async function bootApp() {
            document.getElementById('sync-status').innerText = "A baixar banco de dados...";
            try {
                const dbRef = ref(db);
                const snapshot = await get(child(dbRef, 'users/' + user.uid + '/days'));
                if (snapshot.exists()) {
                    localMemoryData = snapshot.val(); // Cache preenchido com sucesso!
                }
            } catch (e) {
                console.error("Modo offline ativado", e);
            }
            renderDayFromMemory();
            document.getElementById('sync-status').innerText = "App Pronto";
        }

        signInAnonymously(auth).catch(e => console.error("Auth Error", e));
        onAuthStateChanged(auth, (u) => {
            if (u) {
                user = u;
                bootApp();
            }
        });

        // Funções de IA (Mantidas Seguras)
        const apiKey = "AIzaSyC_hFcKVtSUEG9MR9-gERYHYXHSJV0qJtM"; 
        window.organizeNotes = async () => {
            const el = document.getElementById('daily-notes');
            if(!el.value.trim()) return;
            el.classList.add('ai-loading');
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: "Organize as notas de reunião em tópicos profissionais e corrija a gramática:\n\n" + el.value }] }] })
                });
                const data = await res.json();
                el.value = data.candidates[0].content.parts[0].text;
                window.triggerSave();
            } catch (e) { console.error("AI Error:", e); } 
            finally { el.classList.remove('ai-loading'); }
        };

        window.extractPriorities = async () => {
            const text = document.getElementById('daily-notes');
            if(!text.value.trim()) return;
            const btn = document.getElementById('btn-extract');
            btn.classList.add('ai-loading');
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        contents: [{ parts: [{ text: "Extraia 5 prioridades urgentes destas notas em formato JSON array:\n\n" + text.value }] }],
                        generationConfig: { responseMimeType: "application/json", responseSchema: { type: "ARRAY", items: { type: "STRING" } } }
                    })
                });
                const data = await res.json();
                const prios = JSON.parse(data.candidates[0].content.parts[0].text);
                prios.forEach((p, i) => { 
                    const pr = document.getElementById(`priority-${i}`);
                    if(i < 5 && pr) pr.value = p; 
                });
                window.triggerSave();
            } catch (e) { console.error("AI Error:", e); } 
            finally { btn.classList.remove('ai-loading'); }
        };

        // Swipe Otimizado
        let touchstartX = 0;
        let touchstartY = 0;
        document.addEventListener('touchstart', e => {
            touchstartX = e.changedTouches[0].screenX;
            touchstartY = e.changedTouches[0].screenY;
        }, {passive: true});

        document.addEventListener('touchend', e => {
            const touchendX = e.changedTouches[0].screenX;
            const touchendY = e.changedTouches[0].screenY;
            if (Math.abs(touchstartX - touchendX) > 100 && Math.abs(touchstartY - touchendY) < 50) {
                if (touchstartX - touchendX > 100) window.changeDay(1);
                if (touchendX - touchstartX > 100) window.changeDay(-1);
            }
        });
    </script>
</body>
</html>
